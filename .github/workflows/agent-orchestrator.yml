name: Agent Orchestrator

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to assign to the Claude agent"
        required: false
        default: "List all available flows and trigger each one."
  # schedule:
  #   - cron: "0 8 * * *"  # daily at 08:00 UTC — riabilitare quando secrets sono configurati

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_AUTH_TOKEN: ${{ secrets.N8N_AUTH_TOKEN }}
          N8N_AVAILABLE_FLOWS: ${{ vars.N8N_AVAILABLE_FLOWS }}
          TASK: ${{ github.event.inputs.task || 'List all available flows and trigger each one.' }}
        run: python agent/orchestrator.py
